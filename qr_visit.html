<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>زيارة عبر باركود</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Tahoma,sans-serif;background:#090f1c;color:#e2e8f0;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
      .card{background:rgba(13,20,35,.7);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(12px);padding:22px 18px;border-radius:16px;max-width:520px;width:92vw;text-align:center}
      .hint{font-size:13px;color:#94a3b8;margin-top:10px;line-height:1.6}
      a{color:#22c55e}
      .dots{display:inline-block;width:10px;height:10px;border-radius:50%;background:#22c55e;animation:blink 1s infinite}
      @keyframes blink{50%{opacity:.3}}
    </style>
  </head>
  <body>
    <div class="card">
      <h1 style="margin:0 0 10px; font-size:18px;">جارٍ فتح الموقع...</h1>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;color:#cbd5e1">
        <span class="dots" aria-hidden="true"></span>
        <span>يتم إعادة التوجيه تلقائياً</span>
      </div>
      <p class="hint">
        إذا لم يتم فتح الموقع خلال ثواني، اضغط <a id="fallback" href="/index.html">هنا</a>.
      </p>
    </div>

    <script>
      // الهدف: فتح الموقع الرئيسي مباشرة بعد مسح/قراءة الباركود
      // يمكنك تعديل رابط التحويل لو تريد فتح Home # أو رابط محدد.
      const target = '/index.html';
      setTimeout(() => {
        window.location.replace(target);
      }, 600);
    </script>
  </body>
</html>
